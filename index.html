<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ibasho Homes LLC</title>
  <meta name="description" content="Ibasho Homes LLC is a rental property company serving the North Carolina and Virginia areas.">
  <link rel="icon" type="image/png" href="assets/logos/logo--square-nobg--no-text.20251127-2.png">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Georgia', 'Times New Roman', serif;
      color: #3b3b3b;
      background-color: #faf9f6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background-color: #fff;
      border-bottom: 2px solid #8ba86e;
      padding: 1.5rem 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1.25rem;
    }

    header img {
      width: 64px;
      height: 64px;
    }

    header h1 {
      font-size: 1.75rem;
      font-weight: 400;
      color: #4a3728;
      letter-spacing: 0.03em;
    }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem;
    }

    .content {
      max-width: 600px;
      text-align: center;
    }

    .content p {
      font-size: 1.15rem;
      line-height: 1.8;
      color: #555;
      margin-bottom: 1.5rem;
    }

    .divider {
      width: 60px;
      height: 3px;
      background-color: #8ba86e;
      margin: 0 auto 1.5rem;
      border-radius: 2px;
    }

    .region {
      display: inline-block;
      background-color: #f0ede6;
      border: 1px solid #d4cfc4;
      border-radius: 4px;
      padding: 0.25rem 0.75rem;
      margin: 0.25rem;
      font-size: 0.95rem;
      color: #4a3728;
    }

    footer {
      text-align: center;
      padding: 1.5rem;
      font-size: 0.85rem;
      color: #999;
      border-top: 1px solid #e8e5df;
    }
  </style>
</head>
<body>
  <header>
    <img src="assets/logos/logo--square-nobg--no-text.20251127-2.png" alt="Ibasho Homes logo">
    <h1>Ibasho Homes LLC</h1>
  </header>

  <main>
    <div class="content">
      <p>Ibasho Homes LLC is a residential rental property company dedicated to providing quality housing in the southeastern United States.</p>
      <div class="divider"></div>
      <p>We own and manage rental properties in the following areas:</p>
      <div>
        <span class="region">North Carolina</span>
        <span class="region">Virginia</span>
      </div>
    </div>
  </main>

  <footer>
    &copy; 2025 Ibasho Homes LLC. All rights reserved.
  </footer>
</body>
</html>
